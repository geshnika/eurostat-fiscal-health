name: Monthly Eurostat Update

on:
  schedule:
    - cron: '0 7 1 * *'     # Día 1 de cada mes a las 07:00 UTC
  workflow_dispatch:        # Permite ejecución manual

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.14'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install requests pandas sqlalchemy pyodbc python-dotenv

      - name: Install ODBC Driver
        run: |
          sudo apt-get update
          sudo apt-get install -y unixodbc-dev
          wget -q https://packages.microsoft.com/ubuntu/22.04/prod/pool/main/m/msodbcsql18/msodbcsql18_18.4.1.1-1_amd64.deb
          sudo ACCEPT_EULA=Y dpkg -i msodbcsql18_18.4.1.1-1_amd64.deb || sudo apt-get install -f -y
        env:
          DEBIAN_FRONTEND: noninteractive

      - name: Run monthly update
        run: python ingestion/update.py
        env:
          DB_SERVER:   ${{ secrets.DB_SERVER }}
          DB_NAME:     ${{ secrets.DB_NAME }}
          DB_USER:     ${{ secrets.DB_USER }}
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}

      - name: Update RESULTS.md date
        run: |
          DATE=$(date +'%B %d, %Y')
          sed -i "s/<!-- LAST_UPDATED -->/$DATE/" RESULTS.md

      - name: Commit updated RESULTS.md
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git fetch origin main
          git reset --soft origin/main
          git add RESULTS.md
          git diff --staged --quiet || git commit -m "docs: update last updated date in RESULTS.md"
          git push origin main
