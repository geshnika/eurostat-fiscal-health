name: dbt CI

on:
  push:
    branches: [main]
    paths:
      - 'dbt/**'
  workflow_dispatch:

jobs:
  dbt:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install dbt-sqlserver

      - name: Install ODBC Driver
        run: |
          sudo apt-get update
          sudo apt-get install -y unixodbc-dev
          wget -q https://packages.microsoft.com/ubuntu/22.04/prod/pool/main/m/msodbcsql18/msodbcsql18_18.4.1.1-1_amd64.deb
          sudo ACCEPT_EULA=Y dpkg -i msodbcsql18_18.4.1.1-1_amd64.deb || sudo apt-get install -f -y
        env:
          DEBIAN_FRONTEND: noninteractive

      - name: Create profiles.yml
        env:
          DB_SERVER: ${{ secrets.DB_SERVER }}
          DB_NAME: ${{ secrets.DB_NAME }}
          DB_USER: ${{ secrets.DB_USER }}
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
        run: |
          mkdir -p ~/.dbt
          cat > ~/.dbt/profiles.yml << 'EOF'
          eurostat_fiscal:
            target: dev
            outputs:
              dev:
                type: sqlserver
                driver: 'ODBC Driver 18 for SQL Server'
                server: ${DB_SERVER}
                port: 1433
                database: ${DB_NAME}
                schema: dbo
                user: ${DB_USER}
                password: ${DB_PASSWORD}
                encrypt: true
                trust_cert: true
                threads: 4
          EOF

      - name: dbt run
        run: dbt run --project-dir dbt

      - name: dbt test
        run: dbt test --project-dir dbt
